name: Release

# Dispara ao publicar uma tag vX.Y.Z. Gera o .zip do addon e cria um GitHub
# Release com link de download permanente (.../releases/latest).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # necessario p/ criar o Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify .toc version matches the tag
        run: |
          toc=$(grep -oP '##\s*Version:\s*\K[0-9.]+' MountTracker.toc | tr -d '\r')
          if [ "$toc" != "${{ steps.v.outputs.version }}" ]; then
            echo "::error::MountTracker.toc Version ($toc) != tag (${{ steps.v.outputs.version }}). Bump the .toc."
            exit 1
          fi

      - name: Build addon zip
        run: |
          mkdir -p dist/MountTracker
          cp -r MountTracker.toc Core Data Logic UI LICENSE README.md dist/MountTracker/
          (cd dist && zip -rq "MountTracker-${{ steps.v.outputs.version }}.zip" MountTracker)
          ls -la dist

      - name: Extract release notes from CHANGELOG
        run: |
          awk -v v="${{ steps.v.outputs.version }}" '
            index($0, "## [" v "]")==1 {flag=1; next}
            index($0, "## [")==1 {flag=0}
            flag {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "See CHANGELOG.md for details." > notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MountTracker ${{ steps.v.outputs.version }}
          body_path: notes.md
          files: dist/MountTracker-${{ steps.v.outputs.version }}.zip
